<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peer Review Tool — YCRJ and Associates</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F0;
  --surface: #FFFFFF;
  --surface2: #F0EFE9;
  --border: #E2E0D8;
  --border2: #D0CEC4;
  --text: #1A1916;
  --text2: #6B6860;
  --text3: #9E9C96;
  --accent: #1C4F8A;
  --accent-light: #E8EFF8;
  --green: #2D7A3A;
  --green-light: #E6F4E8;
  --red: #B83232;
  --red-light: #FAEBEB;
  --amber: #8A5A00;
  --amber-light: #FDF3E0;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.hidden { display: none !important; }
input, select, button, textarea { font-family: 'DM Sans', sans-serif; }

/* ── LOGIN ── */
#loginPage {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  background-image: radial-gradient(circle at 20% 50%, rgba(28,79,138,0.04) 0%, transparent 60%),
                    radial-gradient(circle at 80% 20%, rgba(45,122,58,0.04) 0%, transparent 50%);
}
.login-wrap { width: 100%; max-width: 400px; padding: 1.5rem; }
.login-logo {
  display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;
}
.login-logo-mark {
  width: 36px; height: 36px; background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 600; font-size: 14px; letter-spacing: -0.5px;
}
.login-logo-text { font-size: 15px; font-weight: 500; color: var(--text2); }
.login-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 2rem; box-shadow: var(--shadow-md);
}
.login-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.75rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.field input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--surface);
  color: var(--text); font-size: 14px; transition: border-color .15s;
}
.field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(28,79,138,0.08); }
.btn-login {
  width: 100%; padding: 10px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
  cursor: pointer; margin-top: .5rem; transition: background .15s;
}
.btn-login:hover { background: #163d6e; }
.login-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
.login-footer { font-size: 11px; color: var(--text3); text-align: center; margin-top: 1.5rem; }

/* ── SHELL ── */
#appShell { display: none; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; height: 54px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 200;
  box-shadow: var(--shadow);
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 30px; height: 30px; background: var(--accent); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 600; font-size: 12px;
}
.brand-name { font-size: 14px; font-weight: 600; }
.brand-sub { font-size: 11px; color: var(--text3); }
.topbar-nav { display: flex; gap: 2px; }
.nav-btn {
  padding: 6px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; background: transparent; color: var(--text2);
  transition: all .15s;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--accent-light); color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.sync-indicator {
  font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px;
  font-family: 'DM Mono', monospace;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.sync-dot.syncing { animation: pulse 1s infinite; background: var(--amber); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.user-chip {
  display: flex; align-items: center; gap: 6px; padding: 4px 10px;
  background: var(--surface2); border-radius: 20px; font-size: 12px; font-weight: 500;
}
.user-avatar {
  width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
  color: white; font-size: 10px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
}
.role-pip {
  font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 500;
}
.role-pip.admin { background: var(--accent-light); color: var(--accent); }
.role-pip.staff { background: var(--green-light); color: var(--green); }
.btn-logout {
  font-size: 12px; color: var(--text3); cursor: pointer; border: 1px solid var(--border);
  background: transparent; padding: 5px 10px; border-radius: var(--radius-sm);
}
.btn-logout:hover { background: var(--surface2); color: var(--text); }
.main { flex: 1; padding: 1.5rem; max-width: 1400px; margin: 0 auto; width: 100%; }

/* ── METRIC CARDS ── */
.metrics-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
.metric-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1rem 1.25rem; box-shadow: var(--shadow);
}
.metric-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.metric-val { font-size: 30px; font-weight: 600; line-height: 1; font-family: 'DM Mono', monospace; }
.metric-val.green { color: var(--green); }
.metric-val.red { color: var(--red); }
.metric-val.amber { color: var(--amber); }
.metric-val.blue { color: var(--accent); }

/* ── CARDS ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 1.25rem;
}
.card-head {
  padding: .875rem 1.25rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
}
.card-title { font-size: 14px; font-weight: 600; }
.card-sub { font-size: 12px; color: var(--text3); }

/* ── TABLES ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border); background: var(--surface2);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 9px 12px; vertical-align: middle; }
.td-mono { font-family: 'DM Mono', monospace; font-size: 11px; }
.td-clip { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-pending { background: var(--red-light); color: var(--red); }
.badge-progress { background: var(--amber-light); color: var(--amber); }
.badge-complete { background: var(--green-light); color: var(--green); }

/* ── FILTERS ── */
.filters {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: .875rem 1.25rem; display: flex; gap: .875rem; align-items: flex-end;
  margin-bottom: 1.25rem; flex-wrap: wrap; box-shadow: var(--shadow);
}
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; }
.fg select {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); font-size: 13px; min-width: 150px;
  cursor: pointer;
}
.fg select:focus { outline: none; border-color: var(--accent); }
.btn { padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all .15s; }
.btn:hover { background: var(--surface2); }
.btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
.btn-accent:hover { background: #163d6e; }
.btn-green { background: var(--green); color: white; border-color: var(--green); }
.btn-green:hover { background: #205c2a; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── SEND BAR ── */
.send-bar {
  background: linear-gradient(135deg, var(--accent-light) 0%, #f0f5fb 100%);
  border: 1px solid #c5d8ee; border-radius: var(--radius);
  padding: 1.125rem 1.25rem; display: flex; align-items: center;
  justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  margin-bottom: 1.25rem; box-shadow: var(--shadow);
}
.send-bar-info h3 { font-size: 14px; font-weight: 600; color: var(--accent); }
.send-bar-info p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.send-log {
  margin-top: 10px; font-size: 12px; padding: 10px 14px;
  border-radius: var(--radius-sm); white-space: pre-wrap;
  font-family: 'DM Mono', monospace; line-height: 1.7; display: none;
}
.send-log.ok { background: var(--green-light); color: var(--green); border: 1px solid #a8d9b0; }
.send-log.err { background: var(--red-light); color: var(--red); border: 1px solid #f0b8b8; }

/* ── PROGRESS BAR ── */
.prog-row { display: flex; align-items: center; gap: 8px; }
.prog-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; min-width: 60px; }
.prog-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s; }
.prog-val { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; min-width: 36px; text-align: right; color: var(--text2); }

/* ── CHECKLIST PANEL ── */
.cl-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-top: 1rem; box-shadow: var(--shadow-md);
  animation: slideDown .2s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.cl-head {
  padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
  border-radius: var(--radius) var(--radius) 0 0;
}
.cl-head-info h3 { font-size: 15px; font-weight: 600; }
.cl-head-info p { font-size: 12px; color: var(--text2); margin-top: 3px; }
.cl-pct-wrap { display: flex; align-items: center; gap: 10px; }
.cl-pct-bar { width: 160px; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.cl-pct-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width .3s; }
.cl-pct-num { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; min-width: 40px; text-align: right; }
.cl-body { padding: 1.25rem; }
.cl-section-title {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: .75rem;
  display: flex; align-items: center; gap: 8px;
}
.cl-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.fin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
.fin-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.fin-field input {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; color: var(--text);
  background: var(--surface); transition: border-color .15s;
  font-family: 'DM Mono', monospace;
}
.fin-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(28,79,138,0.06); }
.fin-field input.err { border-color: var(--red); }
.cl-items { display: flex; flex-direction: column; }
.cl-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.cl-item:last-child { border-bottom: none; }
.cl-item-num { font-size: 11px; color: var(--text3); width: 22px; text-align: right; font-family: 'DM Mono', monospace; flex-shrink: 0; }
.cl-item-name { flex: 1; font-size: 13px; line-height: 1.4; }
.cl-item-btns { display: flex; gap: 4px; flex-shrink: 0; }
.mark-btn {
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--text3); transition: all .15s;
}
.mark-btn:hover { border-color: var(--border2); color: var(--text2); }
.mark-btn.yes.on { background: var(--green-light); color: var(--green); border-color: #8ecf96; }
.mark-btn.no.on { background: var(--red-light); color: var(--red); border-color: #f0b8b8; }
.mark-btn.na.on { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
.cl-footer {
  padding: 1rem 1.25rem; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2); border-radius: 0 0 var(--radius) var(--radius);
}
.cl-footer-left { font-size: 12px; color: var(--text3); }
.cl-footer-right { display: flex; gap: 8px; }

/* ── AUDIT TRAIL ── */
.audit-wrap { max-height: 400px; overflow-y: auto; }
.audit-entry {
  display: flex; gap: 12px; padding: 10px 1.25rem;
  border-bottom: 1px solid var(--border); font-size: 12px;
}
.audit-entry:last-child { border-bottom: none; }
.audit-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); white-space: nowrap; min-width: 130px; }
.audit-user { font-weight: 600; color: var(--accent); min-width: 100px; }
.audit-action { color: var(--text2); flex: 1; }
.audit-udin { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }

/* ── IMPORT ── */
.import-cols { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.col-chip {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 10px; font-size: 11px;
  font-family: 'DM Mono', monospace; color: var(--text2);
}
.upload-msg { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: var(--radius-sm); display: none; }
.upload-msg.ok { background: var(--green-light); color: var(--green); border: 1px solid #a8d9b0; }
.upload-msg.err { background: var(--red-light); color: var(--red); border: 1px solid #f0b8b8; }

/* ── SETUP ── */
.setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.setup-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.setup-field input {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; background: var(--surface);
  color: var(--text); font-family: 'DM Mono', monospace;
}
.setup-note { font-size: 12px; color: var(--text2); line-height: 1.7; margin-top: 10px; }
.setup-note code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 11px; }
.step-list { list-style: none; counter-reset: steps; }
.step-list li { counter-increment: steps; display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; font-size: 13px; color: var(--text2); }
.step-list li::before {
  content: counter(steps); min-width: 22px; height: 22px; background: var(--accent);
  color: white; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--text);
  color: white; padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; z-index: 9999;
  opacity: 0; transform: translateY(8px); transition: all .2s; pointer-events: none;
  box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── EMPTY STATES ── */
.empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
.empty p { font-size: 13px; margin-top: 8px; }

/* ── CREDENTIALS TABLE ── */
.cred-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.cred-table th { padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); background: var(--surface2); }
.cred-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
.cred-table tr:last-child td { border-bottom: none; }
.pwd-chip { font-family: 'DM Mono', monospace; font-size: 12px; background: var(--surface2); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); }
</style>
</head>

function doLogin() {
  const u = document.getElementById('lusr').value.trim();

  if (!user) { document.getElementById('lerr').style.display = 'block'; return; }

  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';

// DATA SYNC
// ═══════════════════════════════════════════
function loadData() {
  if (CONFIG.googleSheetUrl) {
    fetchSheet();
  } else {
    if (!allUDINs.length) allUDINs = [...SAMPLE_UDINS];
    updateSyncLabel('Using sample data');
  }
  loadReviewData();
}

function startSync() {
  syncTimer = setInterval(() => {
    if (CONFIG.googleSheetUrl) fetchSheet();
  }, CONFIG.syncInterval);
}

function fetchSheet() {
  setSyncing(true);
  fetch(CONFIG.googleSheetUrl)
    .then(r => r.text())
    .then(csv => {
      const parsed = Papa.parse(csv, { header: true, skipEmptyLines: true });
      const newUDINs = parsed.data.filter(r => r.UDIN && r.UDIN.trim()).map(r => ({ ...r, UDIN: r.UDIN.trim() }));
      mergeUDINs(newUDINs);
      setSyncing(false);
      const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      updateSyncLabel('Synced ' + now);
    })
    .catch(() => { setSyncing(false); updateSyncLabel('Sync failed'); });
}

function mergeUDINs(newList) {
  const existing = new Map(allUDINs.map(u => [u.UDIN, u]));
  newList.forEach(u => existing.set(u.UDIN, { ...existing.get(u.UDIN), ...u }));
  allUDINs = Array.from(existing.values());
  saveReviewData();
}

function setSyncing(v) {
  document.getElementById('syncDot').className = 'sync-dot' + (v ? ' syncing' : '');
}
function updateSyncLabel(t) { document.getElementById('syncLabel').textContent = t; }

// ═══════════════════════════════════════════
function loadReviewData() {
  try {
    const saved = localStorage.getItem('ycrj_review');
    if (saved) reviewData = JSON.parse(saved);
    const log = localStorage.getItem('ycrj_audit');
    if (log) auditLog = JSON.parse(log);
  } catch(e) {}
}
function saveReviewData() {
  try {
    localStorage.setItem('ycrj_review', JSON.stringify(reviewData));
    localStorage.setItem('ycrj_audit', JSON.stringify(auditLog));
  } catch(e) {}
  if (appsScriptUrl) pushToSheets();
}

function pushToSheets() {
  fetch(appsScriptUrl, {
    method: 'POST',
    body: JSON.stringify({ type: 'review', data: reviewData, audit: auditLog }),
    headers: { 'Content-Type': 'text/plain' }
  }).catch(() => {});
}

function addAudit(action, udin, detail, oldVal, newVal) {
  auditLog.unshift({
    ts: new Date().toISOString(),
    user: currentUser ? currentUser.username : 'system',
    action, udin: udin || '', detail,
    oldVal: oldVal || '', newVal: newVal || ''
  });
  if (auditLog.length > 500) auditLog = auditLog.slice(0, 500);
  saveReviewData();
}

// ═══════════════════════════════════════════
// STATUS HELPERS
// ═══════════════════════════════════════════
function getStatus(udin) {
  const rd = reviewData[udin];
  if (!rd) return 'Pending';
  if (rd.completed) return 'Completed';
  const hasAny = Object.keys(rd.items || {}).length > 0 || rd.turnover || rd.borrowings || rd.networth;
  return hasAny ? 'In Progress' : 'Pending';
}
function statusBadge(s) {
  const cls = { Pending: 'badge-pending', 'In Progress': 'badge-progress', Completed: 'badge-complete' };
  return `<span class="badge ${cls[s] || 'badge-pending'}">${s}</span>`;
}
function fmtINR(v) { return v ? '₹' + Number(v).toLocaleString('en-IN') : '—'; }
function fmtTS(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' +
         d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

// ═══════════════════════════════════════════
// SEND REPORTS
// ═══════════════════════════════════════════
async function sendReports() {
  if (!appsScriptUrl) {
    showSendLog('Apps Script URL not configured. Go to Setup tab and save your Apps Script Web App URL.', 'err');
    return;
  }
  const btn = document.getElementById('btnSend');
  btn.disabled = true; btn.textContent = 'Sending...';
  const today = new Date();
  const todayStr = today.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  const todayKey = today.toDateString();

  const payload = PARTNERS.map(p => {
    const pu = allUDINs.filter(r => r['Partner Name'] === p.name);
    const total = pu.length;
    const completed = pu.filter(r => getStatus(r.UDIN) === 'Completed').length;
    const pending = total - completed;
    const todayDone = pu.filter(r => {
      const rd = reviewData[r.UDIN];
      return rd && rd.completedDate && new Date(rd.completedDate).toDateString() === todayKey;
    }).length;
    const pendingPct = total ? Math.round((pending / total) * 100) : 0;
    const pendingList = pu.filter(r => getStatus(r.UDIN) !== 'Completed').map(r => `${r.UDIN} — ${r['Client Name'] || ''} (${r['Sub-type'] || ''})`);
    const completedList = pu.filter(r => getStatus(r.UDIN) === 'Completed').map(r => `${r.UDIN} — ${r['Client Name'] || ''} (${r['Sub-type'] || ''})`);
    return { name: p.name, email: p.email, total, completed, pending, todayDone, pendingPct, pendingList, completedList, date: todayStr };
  });

  try {
    const res = await fetch(appsScriptUrl, {
      method: 'POST',
      body: JSON.stringify({ type: 'email', partners: payload, firm: CONFIG.firm, sender: CONFIG.senderEmail }),
      headers: { 'Content-Type': 'text/plain' }
    });
    const txt = await res.text();
    showSendLog('✓ Reports sent successfully to all partners.\n' + txt, 'ok');
    addAudit('EMAIL_SENT', null, `End-of-day reports sent to ${PARTNERS.length} partners`);
    showToast('Reports sent!');
  } catch(e) {
    showSendLog('Error: ' + e.message, 'err');
  }
  btn.disabled = false; btn.textContent = 'Send Now to All Partners';
}

function showSendLog(msg, type) {
  const el = document.getElementById('sendLog');
  if (!el) return;
  el.textContent = msg; el.className = 'send-log ' + type; el.style.display = 'block';
}

function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    Papa.parse(file, { header: true, skipEmptyLines: true, complete: res => processImport(res.data) });
  } else {
    const reader = new FileReader();
    reader.onload = ev => {
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      processImport(XLSX.utils.sheet_to_json(ws));
    };
    reader.readAsArrayBuffer(file);
  }
}

function processImport(rows) {
  const valid = rows.filter(r => r.UDIN && String(r.UDIN).trim());
  if (!valid.length) { showMsg('uploadMsg', 'No valid rows found. Check column headers.', 'err'); return; }
  mergeUDINs(valid);
  showMsg('uploadMsg', `✓ ${valid.length} records imported. Duplicates automatically handled.`, 'ok');
  showToast(valid.length + ' UDINs imported');
  addAudit('IMPORT', null, `${valid.length} UDINs imported by ${currentUser.username}`);
}

function saveSheetUrl() {
  CONFIG.googleSheetUrl = document.getElementById('sheetUrl').value.trim();
  if (CONFIG.googleSheetUrl) {
    fetchSheet();
    showMsg('sheetMsg', '✓ Sheet URL saved. Syncing now...', 'ok');
  } else {
    showMsg('sheetMsg', 'URL cleared. Using manual import.', 'err');
  }
}

function clearData() {
  if (!confirm('Clear all UDIN and review data? This cannot be undone.')) return;
  allUDINs = []; reviewData = {};
  localStorage.removeItem('ycrj_review');
  saveReviewData();
  showMsg('uploadMsg', '✓ All data cleared.', 'ok');
  renderImport();
}

function dlTemplate() {
  const cols = ['Partner Name','UDIN','Date of Signing','Client Name','Document Type','Sub-type','Document Description','Remarks','FY Period'];
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(cols.join(',') + '\n');
  a.download = 'UDIN_Import_Template.csv'; a.click();
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id); if (!el) return;
  el.textContent = msg; el.className = 'upload-msg ' + type; el.classList.remove('hidden');
}

// ═══════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════
function renderSetup() {
  document.getElementById('mainArea').innerHTML = `
    <div class="card">
      <div class="card-head"><span class="card-title">Google Apps Script Configuration</span></div>
      <div style="padding:1.25rem">
        <div class="fg" style="max-width:500px;margin-bottom:1rem">
          <label>Apps Script Web App URL</label>
          <input type="text" id="asUrl" value="${appsScriptUrl}" placeholder="https://script.google.com/macros/s/.../exec" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:'DM Mono',monospace;width:100%">
        </div>
        <button class="btn btn-accent" onclick="saveAsUrl()">Save URL</button>
        <div class="upload-msg hidden" id="asMsg"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Staff Credentials</span></div>
      <div style="padding:1.25rem">
        <table class="cred-table">
          <thead><tr><th>#</th><th>Name</th><th>Username</th><th>Password</th><th>Role</th><th>Assigned Partners</th></tr></thead>
          <tbody>${USERS.map((u,i) => `<tr>
            <td>${i+1}</td>
            <td style="font-weight:500">${u.name}</td>
            <td class="td-mono">${u.username}</td>
            <td><span class="pwd-chip">${u.password}</span></td>
            <td><span class="role-pip ${u.role}">${u.role}</span></td>
            <td style="font-size:12px;color:var(--text2)">${u.partners ? u.partners.join(', ') : 'All'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Partner Email Directory</span></div>
      <div style="padding:1.25rem">
        <table class="cred-table">
          <thead><tr><th>#</th><th>Partner Name</th><th>Email Address</th></tr></thead>
          <tbody>${PARTNERS.map((p,i) => `<tr>
            <td>${i+1}</td>
            <td style="font-weight:500">${p.name}</td>
            <td class="td-mono" style="font-size:12px">${p.email}</td>
          </tr>`).join('')}</tbody>
        </table>
        <div style="font-size:11px;color:var(--text3);margin-top:10px">To update email addresses, edit the PARTNERS array in index.html</div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Setup Guide</span></div>
      <div style="padding:1.25rem">
        <ul class="step-list">
          <li>Create a Google Sheet with two tabs: <strong>UDIN_Master</strong> (your UDIN list) and <strong>Review_Data</strong> (tool writes here automatically)</li>
          <li>In Google Sheet → File → Share → Publish to web → Select UDIN_Master sheet → CSV format → Publish. Copy the URL and paste it in the Import tab.</li>
          <li>Open Apps Script (Extensions → Apps Script) in your Google Sheet. Paste the <strong>Code.gs</strong> script provided. Deploy as Web App → Execute as Me → Anyone can access. Copy the URL.</li>
          <li>Paste the Apps Script Web App URL above and click Save.</li>
          <li>Upload this tool to <strong>GitHub Pages</strong>: Create a repo → Upload index.html and Code.gs → Enable Pages in Settings → Branch: main.</li>
          <li>The daily email trigger at <strong>5:15 PM IST</strong> is set in the Apps Script time-based trigger. Go to Apps Script → Triggers → Add trigger → dailyReport → Time-driven → Day timer → 5–6 PM.</li>
        </ul>
      </div>
    </div>`;
}

function saveAsUrl() {
  appsScriptUrl = document.getElementById('asUrl').value.trim();
  CONFIG.appsScriptUrl = appsScriptUrl;
  showMsg('asMsg', appsScriptUrl ? '✓ Apps Script URL saved.' : 'URL cleared.', appsScriptUrl ? 'ok' : 'err');
}

// ═══════════════════════════════════════════
// STAFF REVIEW
// ═══════════════════════════════════════════
function renderReview() {
  const myPartners = currentUser.partners || [];
  const myUDINs = allUDINs.filter(r => myPartners.includes(r['Partner Name']));

  document.getElementById('mainArea').innerHTML = `
    <div class="filters">
      <div class="fg"><label>Period</label>
        <select id="fPeriod"><option value="">All</option><option>FY 2023-24</option><option>FY 2024-25</option><option>FY 2025-26</option></select></div>
      <div class="fg"><label>Status</label>
        <select id="fStatus"><option value="">All</option><option>Pending</option><option>In Progress</option><option>Completed</option></select></div>
      <button class="btn" onclick="applyFilters()">Apply</button>
      <button class="btn" onclick="resetFilters()">Reset</button>
      <div style="margin-left:auto;font-size:12px;color:var(--text3);align-self:center">
        Reviewing: <strong>${myPartners.join(', ')}</strong>
      </div>
    </div>
    <div class="card" id="udinCard">
      <div class="card-head">
        <span class="card-title">UDIN List</span>
        <span class="card-sub" id="udinCount">${myUDINs.length} records</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th style="width:28px"></th>
            <th>UDIN</th><th>Date</th><th>Partner</th><th>Client</th>
            <th>Doc Type</th><th>Service</th><th>Turnover</th><th>Borrowings</th><th>Networth</th><th>Status</th>
          </tr></thead>
          <tbody id="udinBody"></tbody>
        </table>
      </div>
    </div>
    <div id="clPanel"></div>`;

  renderUDINTable(myUDINs);
}

function applyFilters() {
  const myPartners = currentUser.partners || [];
  let data = allUDINs.filter(r => myPartners.includes(r['Partner Name']));
  const p = document.getElementById('fPeriod').value;
  const s = document.getElementById('fStatus').value;
  if (p) data = data.filter(r => r['FY Period'] === p);
  if (s) data = data.filter(r => getStatus(r.UDIN) === s);
  renderUDINTable(data);
}

function resetFilters() {
  ['fPeriod','fStatus'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  renderReview();
}

function renderUDINTable(data) {
  const cnt = document.getElementById('udinCount');
  if (cnt) cnt.textContent = data.length + ' record' + (data.length !== 1 ? 's' : '');
  const tbody = document.getElementById('udinBody');
  if (!tbody) return;
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="11"><div class="empty"><p>No records match the filters.</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => {
    const rd = reviewData[r.UDIN] || {};
    return `<tr onclick="openChecklist('${r.UDIN}')" style="cursor:pointer">
      <td style="color:var(--text3);font-size:12px">›</td>
      <td class="td-mono">${r.UDIN}</td>
      <td style="white-space:nowrap">${r['Date of Signing']||''}</td>
      <td>${r['Partner Name']||''}</td>
      <td class="td-clip">${r['Client Name']||''}</td>
      <td class="td-clip">${r['Document Type']||''}</td>
      <td class="td-clip">${r['Sub-type']||''}</td>
      <td style="font-size:12px;font-family:'DM Mono',monospace">${fmtINR(rd.turnover)}</td>
      <td style="font-size:12px;font-family:'DM Mono',monospace">${fmtINR(rd.borrowings)}</td>
      <td style="font-size:12px;font-family:'DM Mono',monospace">${fmtINR(rd.networth)}</td>
      <td>${statusBadge(getStatus(r.UDIN))}</td>
    </tr>`;
  }).join('');
}

function openChecklist(udin) {
  const rec = allUDINs.find(r => r.UDIN === udin);
  if (!rec) return;
  const svc = rec['Sub-type'] || '';
  const items = CHECKLISTS[svc] || [];
  if (!reviewData[udin]) reviewData[udin] = { items: {}, turnover: '', borrowings: '', networth: '', completed: false, completedDate: null, createdBy: currentUser.username, createdAt: new Date().toISOString() };
  const rd = reviewData[udin];
  addAudit('OPEN', udin, `${currentUser.username} opened UDIN for review`);
  const panel = document.getElementById('clPanel');
  if (!panel) return;

  function pct() {
    const marked = items.filter((_, i) => rd.items[i]).length;
    const finDone = (rd.turnover && rd.borrowings && rd.networth) ? 1 : 0;
    return Math.round(((marked + finDone) / (items.length + 1)) * 100);
  }
  function canComplete() {
    return items.every((_, i) => rd.items[i]) && rd.turnover && rd.borrowings && rd.networth;
  }

  panel.innerHTML = `<div class="cl-panel">
    <div class="cl-head">
      <div class="cl-head-info">
        <h3>${rec['Client Name'] || ''} — ${svc}</h3>
        <p>UDIN: <span style="font-family:'DM Mono',monospace">${udin}</span> &nbsp;·&nbsp; Partner: ${rec['Partner Name'] || ''} &nbsp;·&nbsp; ${rec['FY Period'] || ''}</p>
      </div>
      <div class="cl-pct-wrap">
        <div class="cl-pct-bar"><div class="cl-pct-fill" id="pFill" style="width:${pct()}%"></div></div>
        <span class="cl-pct-num" id="pNum">${pct()}%</span>
      </div>
    </div>
    <div class="cl-body">
      <div class="cl-section-title">Financial Details (Mandatory)</div>
      <div class="fin-grid">
        <div class="fin-field"><label>Turnover (₹)</label><input type="number" id="fTurnover" value="${rd.turnover||''}" placeholder="0" oninput="updateFin('turnover',this.value,'${udin}')"></div>
        <div class="fin-field"><label>Borrowings (₹)</label><input type="number" id="fBorrowings" value="${rd.borrowings||''}" placeholder="0" oninput="updateFin('borrowings',this.value,'${udin}')"></div>
        <div class="fin-field"><label>Networth (₹)</label><input type="number" id="fNetworth" value="${rd.networth||''}" placeholder="0" oninput="updateFin('networth',this.value,'${udin}')"></div>
      </div>
      <div class="cl-section-title">Checklist — ${svc} (${items.length} items)</div>
      <div class="cl-items">
        ${items.map((item, i) => `
        <div class="cl-item" id="ci${i}">
          <span class="cl-item-num">${i+1}</span>
          <span class="cl-item-name">${item}</span>
          <div class="cl-item-btns">
            <button class="mark-btn yes ${rd.items[i]==='Yes'?'on':''}" onclick="markItem(${i},'Yes','${udin}')">Yes</button>
            <button class="mark-btn no ${rd.items[i]==='No'?'on':''}" onclick="markItem(${i},'No','${udin}')">No</button>
            <button class="mark-btn na ${rd.items[i]==='NA'?'on':''}" onclick="markItem(${i},'NA','${udin}')">NA</button>
          </div>
        </div>`).join('')}
      </div>
    </div>
    <div class="cl-footer">
      <div class="cl-footer-left">${rd.completed ? `Completed by ${rd.completedBy || ''} on ${fmtTS(rd.completedDate)}` : 'Fill all fields and mark all items to complete.'}</div>
      <div class="cl-footer-right">
        <button class="btn" onclick="saveProgress('${udin}')">Save Progress</button>
        <button class="btn btn-green" id="btnComplete" onclick="markComplete('${udin}')" ${canComplete() ? '' : 'disabled'}>
          ${rd.completed ? '✓ Re-mark Complete' : 'Mark as Complete'}
        </button>
      </div>
    </div>
  </div>`;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

window.updateFin = function(field, val, udin) {
  const old = reviewData[udin][field];
  reviewData[udin][field] = val;
  if (old !== val) addAudit('EDIT_FIN', udin, `${currentUser.username} updated ${field}`, old ? '₹'+Number(old).toLocaleString('en-IN') : '—', val ? '₹'+Number(val).toLocaleString('en-IN') : '—');
  refreshCL(udin);
};

window.markItem = function(idx, val, udin) {
  const svc = (allUDINs.find(r => r.UDIN === udin) || {})['Sub-type'] || '';
  const itemName = (CHECKLISTS[svc] || [])[idx] || 'Item ' + (idx+1);
  const old = reviewData[udin].items[idx];
  reviewData[udin].items[idx] = val;
  if (old !== val) addAudit('MARK_ITEM', udin, `${currentUser.username} marked "${itemName}" as ${val}`, old || '—', val);
  refreshCL(udin);
};

window.saveProgress = function(udin) {
  reviewData[udin].savedBy = currentUser.username;
  reviewData[udin].savedAt = new Date().toISOString();
  saveReviewData();
  renderUDINTable(allUDINs.filter(r => (currentUser.partners || []).includes(r['Partner Name'])));
  addAudit('SAVE', udin, `${currentUser.username} saved progress`);
  showToast('Progress saved');
};

window.markComplete = function(udin) {
  const wasCompleted = reviewData[udin].completed;
  reviewData[udin].completed = true;
  reviewData[udin].completedBy = currentUser.username;
  reviewData[udin].completedDate = new Date().toISOString();
  saveReviewData();
  renderUDINTable(allUDINs.filter(r => (currentUser.partners || []).includes(r['Partner Name'])));
  addAudit(wasCompleted ? 'RE_COMPLETE' : 'COMPLETE', udin, `${currentUser.username} marked UDIN as complete`);
  showToast('UDIN marked as Completed ✓');
  const bc = document.getElementById('btnComplete');
  if (bc) { bc.textContent = '✓ Re-mark Complete'; bc.disabled = false; }
  const footer = document.querySelector('.cl-footer-left');
  if (footer) footer.textContent = `Completed by ${currentUser.username} on ${fmtTS(new Date().toISOString())}`;
};

function refreshCL(udin) {
  const rd = reviewData[udin];
  const svc = (allUDINs.find(r => r.UDIN === udin) || {})['Sub-type'] || '';
  const items = CHECKLISTS[svc] || [];
  function pct() {
    const marked = items.filter((_, i) => rd.items[i]).length;
    const finDone = (rd.turnover && rd.borrowings && rd.networth) ? 1 : 0;
    return Math.round(((marked + finDone) / (items.length + 1)) * 100);
  }
  const f = document.getElementById('pFill'); if (f) f.style.width = pct() + '%';
  const n = document.getElementById('pNum'); if (n) n.textContent = pct() + '%';
  items.forEach((_, i) => {
    const ci = document.getElementById('ci' + i); if (!ci) return;
    ci.querySelectorAll('.mark-btn').forEach(b => b.classList.remove('on'));
    const v = rd.items[i];
    if (v) { const b = ci.querySelector('.mark-btn.' + v.toLowerCase()); if (b) b.classList.add('on'); }
  });
  const bc = document.getElementById('btnComplete');
  const canC = items.every((_, i) => rd.items[i]) && rd.turnover && rd.borrowings && rd.networth;
  if (bc) bc.disabled = !canC;
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
